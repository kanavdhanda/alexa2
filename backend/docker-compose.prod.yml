services:
  backend:
    image: 116137269322.dkr.ecr.us-east-1.amazonaws.com/alexa-india-backend:latest
    container_name: alexa-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - AWS_REGION=us-east-1
      - BEDROCK_MODEL_ID=amazon.nova-micro-v1:0
      - MOCK_LLM=false
      - NODE_ENV=production
      - PORT=3001
      - ALLOWED_ORIGINS=https://alexa2-frontend.vercel.app
      - SARVAM_API_KEY=${SARVAM_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - S3_BUCKET=alexa-india-audio
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
