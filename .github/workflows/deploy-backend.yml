name: Test → Build → Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  AWS_REGION: us-east-1
  ECR_REPO: alexa-india-backend
  ACCOUNT_ID: 116137269322
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Run test suite (MOCK_LLM=true — no real AWS calls)
        working-directory: backend
        run: MOCK_LLM=true npm test
        env:
          AWS_REGION: us-east-1

  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, tag and push Docker image
        id: build
        working-directory: backend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPO:$IMAGE_TAG .
          docker tag $REGISTRY/$ECR_REPO:$IMAGE_TAG $REGISTRY/$ECR_REPO:latest
          docker push $REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPO:latest
          echo "image_uri=$REGISTRY/$ECR_REPO:latest" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Copy docker-compose.prod.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: backend/docker-compose.prod.yml
          target: /home/ec2-user/
          strip_components: 1
      - name: SSH — pull new image and restart via docker compose
        uses: appleboy/ssh-action@v1
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GROQ_API_KEY,SARVAM_API_KEY,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY
          script: |
            set -e
            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS \
                           --password-stdin 116137269322.dkr.ecr.us-east-1.amazonaws.com
            docker pull 116137269322.dkr.ecr.us-east-1.amazonaws.com/alexa-india-backend:latest
            cd /home/ec2-user
            sudo docker stop alexa-backend 2>/dev/null || true
            sudo docker rm -f alexa-backend 2>/dev/null || true
            sudo docker compose -f docker-compose.prod.yml down 2>/dev/null || true
            GROQ_API_KEY="$GROQ_API_KEY" SARVAM_API_KEY="$SARVAM_API_KEY" AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" sudo -E docker compose -f docker-compose.prod.yml up --build -d
            sudo docker system prune -f
      - name: Verify /api/health — final gate
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Waiting for backend to become healthy..."
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health)
              if [ "$STATUS" = "200" ]; then
                echo "✓ /api/health returned 200 — deployment successful"
                exit 0
              fi
              echo "  attempt $i/12 — got HTTP $STATUS, waiting 5s..."
              sleep 5
            done
            echo "✗ /api/health did not return 200 after 60s"
            sudo docker compose -f /home/ec2-user/docker-compose.prod.yml logs --tail=50
            exit 1
